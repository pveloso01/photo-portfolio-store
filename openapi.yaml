      operationId: createAuditExport
      tags: [admin]
      summary: Start an async audit-log CSV export
      security: [{ bearerAuth: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                from: { type: string, format: date-time }
                to: { type: string, format: date-time }
                actorId: { $ref: '#/components/schemas/Uuid' }
                action: { type: string }
                targetType: { type: string }
                targetId: { type: string }
      responses:
        '202':
          description: Export job accepted.
          content:
            application/json:
              schema:
                type: object
                required: [jobId]
                properties:
                  jobId: { $ref: '#/components/schemas/Uuid' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /v1/admin/audit/export/{jobId}:
    parameters:
      - name: jobId
        in: path
        required: true
        schema: { $ref: '#/components/schemas/Uuid' }
    get:
      operationId: getAuditExportStatus
      tags: [admin]
      summary: Poll an audit export job; returns a signed URL when ready
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Export status.
          content:
            application/json:
              schema:
                type: object
                required: [status, rowCount]
                properties:
                  status: { type: string, enum: [pending, running, ready, failed] }
                  rowCount: { type: integer, nullable: true }
                  downloadUrl: { type: string, format: uri }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /v1/admin/audit-log:
    get:
      operationId: listAuditLog
      tags: [admin]
      summary: List audit log entries (admin-only)
      x-status: stub
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - in: query
          name: action
          schema: { type: string }
        - in: query
          name: eventId
          schema: { $ref: '#/components/schemas/Uuid' }
        - in: query
          name: actorUserId
          schema: { $ref: '#/components/schemas/Uuid' }
      responses:
        '200':
          description: Paginated audit entries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuditLog'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/ServerError' }
  /v1/admin/audit-log.csv:
    get:
      operationId: exportAuditLogCsv
      tags: [admin]
      summary: Export audit log as CSV (admin-only)
      x-status: stub
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: action
          schema: { type: string }
        - in: query
          name: eventId
          schema: { $ref: '#/components/schemas/Uuid' }
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: CSV stream.
          content:
            text/csv:
              schema: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/ServerError' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdParam:
      in: path
      name: id
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    Cursor:
      in: query
      name: cursor
      schema:
        type: string
        description: Opaque cursor returned by a prior page.
    Limit:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
  responses:
    BadRequest:
      description: Malformed request.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: Missing or invalid credentials.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Authenticated but not permitted.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: Conflict with current resource state.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unprocessable:
      description: Validation failed.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    ServerError:
      description: Unexpected server error.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
  schemas:
    Uuid:
      type: string
      format: uuid
    Money:
      type: object
      required: [cents, currency]
      properties:
        cents:
          type: integer
          description: Smallest currency unit (e.g. USD cents).
        currency:
          type: string
          description: ISO 4217 code.
    Pagination:
      type: object
      required: [nextCursor]
      properties:
        nextCursor:
          type: string
          nullable: true
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Stable machine-readable error code.
            message:
              type: string
            details:
              type: object
              additionalProperties: true
            trace_id:
              type: string
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
    RootResponse:
      type: object
      required: [name, ok]
      properties:
        name: { type: string }
        ok: { type: boolean }

    UserRole:
      type: string
      enum: [superadmin, admin, photographer, organizer, assistant, attendee]
    UserStatus:
      type: string
      enum: [active, suspended, deleted]
    User:
      type: object
      required: [id, email, role, status, createdAt]
      properties:
        id: { $ref: '#/components/schemas/Uuid' }
        email: { type: string, format: email }
        displayName: { type: string, nullable: true }
        role: { $ref: '#/components/schemas/UserRole' }
        status: { $ref: '#/components/schemas/UserStatus' }
        createdAt: { type: string, format: date-time }
    UserPublic:
      type: object
      required: [id, role]
      properties:
        id: { $ref: '#/components/schemas/Uuid' }
        displayName: { type: string, nullable: true }
        role: { $ref: '#/components/schemas/UserRole' }
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 12 }
        displayName: { type: string }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string }
    PasswordlessRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
    PasswordlessVerify:
      type: object
      required: [email, code]
      properties:
        email: { type: string, format: email }
        code: { type: string }
    AuthTokens:
      type: object
      required: [accessToken, refreshToken, expiresIn, user]
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresIn:
          type: integer
          description: Access-token TTL in seconds.
        user: { $ref: '#/components/schemas/User' }

    EventStatus:
      type: string
      enum: [draft, published, archived]
    EventMemberRole:
      type: string
      enum: [organizer, photographer, assistant]
    Event:
      type: object
      required:
        - id
        - orgId
        - name
        - slug
        - eventDate
        - timezone
        - status
        - allowFaceSearch
        - retentionDays
        - currency
        - createdAt
        - updatedAt
      properties:
        id: { $ref: '#/components/schemas/Uuid' }
        orgId: { $ref: '#/components/schemas/Uuid' }
        name: { type: string }
        slug: { type: string }
        description: { type: string, nullable: true }
        eventDate: { type: string, format: date }
        location: { type: string, nullable: true }
        timezone: { type: string }
        status: { $ref: '#/components/schemas/EventStatus' }
        allowFaceSearch: { type: boolean }
        retentionDays: { type: integer, minimum: 1 }
        currency: { type: string }
        coverPhotoId:
          oneOf:
            - { $ref: '#/components/schemas/Uuid' }
            - { type: 'null' }
        publishedAt: { type: string, format: date-time, nullable: true }
        archivedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    EventCreate:
      type: object
      required: [orgId, name, slug, eventDate]
      properties:
        orgId: { $ref: '#/components/schemas/Uuid' }
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        eventDate: { type: string, format: date }
        location: { type: string }
        timezone: { type: string, default: UTC }
        currency: { type: string, default: USD }
        allowFaceSearch: { type: boolean, default: true }
        retentionDays: { type: integer, default: 30, minimum: 1 }
    EventPatch:
      type: object
      properties:
        name: { type: string }
        slug: { type: string }
        description: { type: string, nullable: true }
        eventDate: { type: string, format: date }
        location: { type: string, nullable: true }
        timezone: { type: string }
        currency: { type: string }
        allowFaceSearch: { type: boolean }
        retentionDays: { type: integer, minimum: 1 }
        coverPhotoId: { $ref: '#/components/schemas/Uuid' }
    EventMember:
      type: object
      required: [eventId, userId, role, splitPct, createdAt]
      properties:
        eventId: { $ref: '#/components/schemas/Uuid' }
        userId: { $ref: '#/components/schemas/Uuid' }
        role: { $ref: '#/components/schemas/EventMemberRole' }
        splitPct:
          type: string
          description: Decimal as string (e.g. "33.33").
        createdAt: { type: string, format: date-time }
    EventMemberCreate:
      type: object
      required: [userId, role]
      properties:
        userId: { $ref: '#/components/schemas/Uuid' }
        role: { $ref: '#/components/schemas/EventMemberRole' }
        splitPct: { type: string, default: "0.00" }
    EventMemberPatch:
      type: object
      properties:
        role: { $ref: '#/components/schemas/EventMemberRole' }
        splitPct: { type: string }
    FtpCredentialIssued:
      type: object
      required: [id, eventId, username, password, expiresAt]
      properties:
        id: { $ref: '#/components/schemas/Uuid' }
        eventId: { $ref: '#/components/schemas/Uuid' }
        username: { type: string }
        password:
          type: string
          description: Returned ONCE on rotation; never retrievable afterward.
        expiresAt: { type: string, format: date-time }

    UploadSessionStatus:
      type: string
      enum: [in_progress, completed, aborted, expired]
    PhotoStatus:
      type: string
      enum: [processing, ready, hidden, failed, takedown]
    DerivativeKind:
      type: string
      enum: [thumb, preview, web, full]
    UploadInitRequest:
      type: object
      required: [originalFilename, contentType, totalBytes, chunkSizeBytes]
      properties:
        originalFilename: { type: string }
        contentType: { type: string }
        totalBytes:
          type: integer
          format: int64
          minimum: 1
        chunkSizeBytes:
          type: integer
          minimum: 1
    UploadSession:
      type: object
      required:
        - id
        - eventId
        - photographerUserId
        - originalFilename
        - contentType
        - totalBytes
        - chunksReceived
        - chunkSizeBytes
        - status
        - expiresAt
        - createdAt
      properties:
        id: { $ref: '#/components/schemas/Uuid' }
        eventId: { $ref: '#/components/schemas/Uuid' }
        photographerUserId: { $ref: '#/components/schemas/Uuid' }
        originalFilename: { type: string }
        contentType: { type: string }
        totalBytes: { type: integer, format: int64 }
        chunksReceived: { type: integer }
        chunkSizeBytes: { type: integer }
        status: { $ref: '#/components/schemas/UploadSessionStatus' }
        expiresAt: { type: string, format: date-time }
        completedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
    UploadChunkAck:
      type: object
      required: [sessionId, partNumber, etag, chunksReceived]
      properties:
        sessionId: { $ref: '#/components/schemas/Uuid' }
        partNumber: { type: integer }
        etag: { type: string }
        chunksReceived: { type: integer }
    PhotoDerivative:
      type: object
      required: [id, photoId, kind, objectKey, bytes, width, height, watermarked, createdAt]
      properties:
        id: { $ref: '#/components/schemas/Uuid' }
        photoId: { $ref: '#/components/schemas/Uuid' }
        kind: { $ref: '#/components/schemas/DerivativeKind' }
        objectKey: { type: string }
        bytes: { type: integer }
        width: { type: integer }
        height: { type: integer }
        watermarked: { type: boolean }
        createdAt: { type: string, format: date-time }
    Photo:
      type: object
      required:
        - id
        - eventId
        - photographerUserId
        - originalBytes
        - contentType
        - status
        - hidden
        - featured
        - createdAt
        - updatedAt
      properties:
        id: { $ref: '#/components/schemas/Uuid' }
        eventId: { $ref: '#/components/schemas/Uuid' }
        photographerUserId: { $ref: '#/components/schemas/Uuid' }
        uploadSessionId: { $ref: '#/components/schemas/Uuid' }
        originalBytes: { type: integer, format: int64 }
        contentType: { type: string }
        width: { type: integer, nullable: true }
        height: { type: integer, nullable: true }
        capturedAt: { type: string, format: date-time, nullable: true }
        status: { $ref: '#/components/schemas/PhotoStatus' }
        hidden: { type: boolean }
        featured: { type: boolean }
        takedownAt: { type: string, format: date-time, nullable: true }
        derivatives:
          type: array
          items: { $ref: '#/components/schemas/PhotoDerivative' }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    PaginatedEvents:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Event' }
        nextCursor: { type: string, nullable: true }
    PaginatedPhotos:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Photo' }
        nextCursor: { type: string, nullable: true }
    PaginatedProducts:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Product' }
        nextCursor: { type: string, nullable: true }
    PaginatedAuditLog:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/AuditLogEntry' }
        nextCursor: { type: string, nullable: true }

    MatchSource:
      type: string
      enum: [bib, name, face, text, hybrid]
    SearchMatch:
      type: object
      required: [photoId, score, source, rank]
      properties:
        photoId: { $ref: '#/components/schemas/Uuid' }
        score: { type: number, format: float }
        source: { $ref: '#/components/schemas/MatchSource' }
        rank: { type: integer }
        photo: { $ref: '#/components/schemas/Photo' }
    SearchResults:
      type: object
      required: [sessionId, matches]
      properties:
        sessionId: { $ref: '#/components/schemas/Uuid' }
        matches:
          type: array
          items: { $ref: '#/components/schemas/SearchMatch' }
    BibSearchRequest:
      type: object
      required: [bib]
      properties:
        bib: { type: string }
    NameSearchRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
    FaceSearchRequest:
      type: object
      required: [consentId, selfie]
      properties:
        consentId: { $ref: '#/components/schemas/Uuid' }
        selfie:
          type: string
          format: binary

    ProductKind:
      type: string
      enum: [digital_single, digital_bundle, foto_flat, print]
    Product:
      type: object
      required:
        - id
        - eventId
        - kind
        - sku
        - name
        - priceCents
        - currency
        - licenseTierId
        - active
        - createdAt
        - updatedAt
      properties:
        id: { $ref: '#/components/schemas/Uuid' }
        eventId: { $ref: '#/components/schemas/Uuid' }
        kind: { $ref: '#/components/schemas/ProductKind' }
        sku: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        priceCents: { type: integer }
        currency: { type: string }
        licenseTierId: { $ref: '#/components/schemas/Uuid' }
        configJsonb:
          type: object
          additionalProperties: true
        photoId: { $ref: '#/components/schemas/Uuid' }
        active: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    ProductCreate:
      type: object
      required: [kind, sku, name, priceCents, currency, licenseTierId]
      properties:
        kind: { $ref: '#/components/schemas/ProductKind' }
        sku: { type: string }
        name: { type: string }
        description: { type: string }
        priceCents: { type: integer, minimum: 0 }
        currency: { type: string }
        licenseTierId: { $ref: '#/components/schemas/Uuid' }
        photoId: { $ref: '#/components/schemas/Uuid' }
        configJsonb:
          type: object
          additionalProperties: true

    CartStatus:
      type: string
      enum: [active, converted, expired, abandoned]
    CartItem:
      type: object
      required:
        - id
        - cartId
        - productId
        - licenseTierId
        - quantity
        - unitPriceCents
        - currency
        - createdAt
      properties:
        id: { $ref: '#/components/schemas/Uuid' }
        cartId: { $ref: '#/components/schemas/Uuid' }
        productId: { $ref: '#/components/schemas/Uuid' }
        photoId: { $ref: '#/components/schemas/Uuid' }
        licenseTierId: { $ref: '#/components/schemas/Uuid' }
        quantity: { type: integer, minimum: 1 }
        unitPriceCents: { type: integer }
        currency: { type: string }
        createdAt: { type: string, format: date-time }
    Cart:
      type: object
      required:
        - id
        - eventId
        - currency
        - status
        - expiresAt
        - items
        - createdAt
        - updatedAt
      properties:
        id: { $ref: '#/components/schemas/Uuid' }
        userId: { $ref: '#/components/schemas/Uuid' }
        eventId: { $ref: '#/components/schemas/Uuid' }
        currency: { type: string }
        status: { $ref: '#/components/schemas/CartStatus' }
        expiresAt: { type: string, format: date-time }
        convertedAt: { type: string, format: date-time, nullable: true }
        items:
          type: array
          items: { $ref: '#/components/schemas/CartItem' }
        subtotalCents: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CartCreate:
      type: object
      required: [eventId]
      properties:
        eventId: { $ref: '#/components/schemas/Uuid' }
    CartItemCreate:
      description: >
        Either a single-photo product line (productId + licenseTierId) or a
        bundle line (bundleId). Provide exactly one of productId or bundleId.
      type: object
      properties:
        productId: { $ref: '#/components/schemas/Uuid' }
        photoId: { $ref: '#/components/schemas/Uuid' }
        licenseTierId: { $ref: '#/components/schemas/Uuid' }
        bundleId: { $ref: '#/components/schemas/Uuid' }
        quantity: { type: integer, minimum: 1, default: 1 }
    BundleKind:
      type: string
      enum: [bib, foto_flat, custom]
    BundleCreate:
      type: object
      required: [kind, basePriceCents, currency, licenseTierId]
      properties:
        kind: { $ref: '#/components/schemas/BundleKind' }
        selector:
          type: object
          additionalProperties: true
          description: 'bib => {bib:"<value>"}; foto_flat => {all:true}; custom uses photoIds'
        basePriceCents: { type: integer, minimum: 1 }
        currency: { type: string }
        licenseTierId: { $ref: '#/components/schemas/Uuid' }
        name: { type: string }
        photoIds:
          type: array
          items: { $ref: '#/components/schemas/Uuid' }
    BundleResolution:
      type: object
      required: [photoIds, count, totalCents, currency]
      properties:
        photoIds:
          type: array
          items: { $ref: '#/components/schemas/Uuid' }
        count: { type: integer }
        totalCents: { type: integer }
        currency: { type: string }
    FotoFlatSummary:
      type: object
      required: [bundleId, photoCount, priceCents, currency, licenseTierId]
      properties:
        bundleId: { $ref: '#/components/schemas/Uuid' }
        photoCount: { type: integer }
        priceCents: { type: integer }
        currency: { type: string }
        licenseTierId: { $ref: '#/components/schemas/Uuid' }
    PricingEvaluateRequest:
      type: object
      required: [items, currency]
      properties:
        currency: { type: string }
        items:
          type: array
          items:
            type: object
            required: [unitPriceCents, quantity]
            properties:
              unitPriceCents: { type: integer, minimum: 0 }
              quantity: { type: integer, minimum: 1 }
              productId: { $ref: '#/components/schemas/Uuid' }
              bundleId: { $ref: '#/components/schemas/Uuid' }
              photoId: { $ref: '#/components/schemas/Uuid' }
              licenseTierId: { $ref: '#/components/schemas/Uuid' }
        context:
          type: object
          properties:
            eventId: { $ref: '#/components/schemas/Uuid' }
            buyerId: { $ref: '#/components/schemas/Uuid' }
            now: { type: string, format: date-time }
    PricingEvaluateResult:
      type: object
      required: [subtotalCents, discounts, totalCents, currency]
      properties:
        subtotalCents: { type: integer }
        totalCents: { type: integer }
        currency: { type: string }
        discounts:
          type: array
          items:
            type: object
            required: [ruleId, label, amountCents]
            properties:
              ruleId: { $ref: '#/components/schemas/Uuid' }
              label: { type: string }
              amountCents: { type: integer }
    CheckoutRequest:
      type: object
      required: [buyerEmail]
      properties:
        buyerEmail: { type: string, format: email }
    CheckoutResponse:
      type: object
      required: [order, paymentIntentClientSecret]
      properties:
        order: { $ref: '#/components/schemas/Order' }
        paymentIntentClientSecret: { type: string }
    OrderStatus:
      type: string
      enum: [pending_payment, paid, partially_refunded, refunded, failed, cancelled]
    OrderItem:
      type: object
      required:
        - id
        - orderId
        - productId
        - licenseTierId
        - quantity
        - unitPriceCents
        - lineTotalCents
        - currency
        - createdAt
      properties:
        id: { $ref: '#/components/schemas/Uuid' }
        orderId: { $ref: '#/components/schemas/Uuid' }
        productId: { $ref: '#/components/schemas/Uuid' }
        photoId: { $ref: '#/components/schemas/Uuid' }
        licenseTierId: { $ref: '#/components/schemas/Uuid' }
        quantity: { type: integer }
        unitPriceCents: { type: integer }
        lineTotalCents: { type: integer }
        currency: { type: string }
        metadataJsonb:
          type: object
          additionalProperties: true
        createdAt: { type: string, format: date-time }
    Order:
      type: object
      required:
        - id
        - cartId
        - eventId
        - buyerEmail
        - subtotalCents
        - taxCents
        - totalCents
        - currency
        - status
        - placedAt
        - updatedAt
        - items
      properties:
        id: { $ref: '#/components/schemas/Uuid' }
        cartId: { $ref: '#/components/schemas/Uuid' }
        eventId: { $ref: '#/components/schemas/Uuid' }
        buyerEmail: { type: string, format: email }
        buyerUserId: { $ref: '#/components/schemas/Uuid' }
        subtotalCents: { type: integer }
        taxCents: { type: integer }
        discountCents: { type: integer }
        pricingBreakdown:
          type: array
          items:
            type: object
            properties:
              ruleId: { type: string }
              label: { type: string }
              amountCents: { type: integer }
        totalCents: { type: integer }
        refundedCents: { type: integer }
        currency: { type: string }
        stripePaymentIntentId: { type: string, nullable: true }
        stripeChargeId: { type: string, nullable: true }
        status: { $ref: '#/components/schemas/OrderStatus' }
        placedAt: { type: string, format: date-time }
        paidAt: { type: string, format: date-time, nullable: true }
        updatedAt: { type: string, format: date-time }
        items:
          type: array
          items: { $ref: '#/components/schemas/OrderItem' }
        refundRequest:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/OrderRefundRequest'
    PayoutListItem:
      type: object
      required: [id, periodStart, periodEnd, grossCents, feesCents, netCents, status]
      properties:
        id: { $ref: '#/components/schemas/Uuid' }
        periodStart: { type: string, format: date }
        periodEnd: { type: string, format: date }
        grossCents: { type: integer }
        feesCents: { type: integer }
        netCents: { type: integer }
        status: { type: string, enum: [pending, sent, paid, failed] }
        stripeReceiptUrl: { type: string, format: uri }
    EventStats:
      type: object
      required:
        - totalPhotosUploaded
        - photosWithFaces
        - uniqueFacesDetected
        - totalOrders
        - grossRevenueCents
        - netRevenueCents
        - refundCount
        - refundAmountCents
        - conversionRate
        - topPhotographersBySales
        - salesByHour
        - currency
      properties:
        totalPhotosUploaded: { type: integer }
        photosWithFaces: { type: integer }
        uniqueFacesDetected: { type: integer }
        totalOrders: { type: integer }
        grossRevenueCents: { type: integer }
        netRevenueCents: { type: integer }
        refundCount: { type: integer }
        refundAmountCents: { type: integer }
        conversionRate: { type: number }
        currency: { type: string }
        topPhotographersBySales:
          type: array
          items:
            type: object
            properties:
              photographerUserId: { $ref: '#/components/schemas/Uuid' }
              salesCents: { type: integer }
        salesByHour:
          type: array
          items:
            type: object
            properties:
              hour: { type: string }
              salesCents: { type: integer }
              orderCount: { type: integer }
    PhotoStat:
      type: object
      properties:
        photoId: { $ref: '#/components/schemas/Uuid' }
        revenueCents: { type: integer }
        views: { type: integer }
        sales: { type: integer }
    PhotographerStats:
      type: object
      required:
        - totalPhotos
        - totalSales
        - grossEarningsCents
        - pendingPayoutCents
        - paidPayoutsCents
        - topPhotos
        - bottomPhotos
        - conversionRate
        - trafficSources
        - faceMatchAppearanceRate
        - timeseries
      properties:
        totalPhotos: { type: integer }
        totalSales: { type: integer }
        grossEarningsCents: { type: integer }
        pendingPayoutCents: { type: integer }
        paidPayoutsCents: { type: integer }
        conversionRate: { type: number }
        faceMatchAppearanceRate: { type: number }
        topPhotos: { type: array, items: { $ref: '#/components/schemas/PhotoStat' } }
        bottomPhotos: { type: array, items: { $ref: '#/components/schemas/PhotoStat' } }
        trafficSources:
          type: array
          items:
            type: object
            properties:
              source: { type: string }
              views: { type: integer }
        timeseries:
          type: array
          items:
            type: object
            properties:
              day: { type: string }
              views: { type: integer }
              salesCents: { type: integer }
    PayoutSummary:
      type: object
      required: [payoutId, payoutAccountId, photographerId, netCents, currency, status]
      properties:
        payoutId: { $ref: '#/components/schemas/Uuid' }
        payoutAccountId: { $ref: '#/components/schemas/Uuid' }
        photographerId: { $ref: '#/components/schemas/Uuid' }
        netCents: { type: integer }
        currency: { type: string }
        status: { type: string }
    OrderRefundRequest:
      type: object
      required: [id, status, reason, createdAt]
      properties:
        id: { $ref: '#/components/schemas/Uuid' }
        status: { $ref: '#/components/schemas/RefundRequestStatus' }
        reason: { type: string }
        createdAt: { type: string, format: date-time }
    RefundRequestStatus:
      type: string
      enum: [pending, approved, denied, processed]
    RefundRequestCreate:
      type: object
      required: [reason]
      properties:
        reason: { type: string, minLength: 1, maxLength: 2000 }
        requestedItems:
          type: array
          items: { $ref: '#/components/schemas/Uuid' }
    RefundRequestResult:
      type: object
      required: [refundRequestId, status, createdAt]
      properties:
        refundRequestId: { $ref: '#/components/schemas/Uuid' }
        status: { type: string, enum: [pending] }
        createdAt: { type: string, format: date-time }
    PricingTier:
      type: object
      required: [id, code, label, multiplier, scopeDescription]
      properties:
        id: { $ref: '#/components/schemas/Uuid' }
        code: { type: string }
        label: { type: string }
        multiplier: { type: number }
        scopeDescription: { type: string }
    OrderDownloadLink:
      type: object
      required: [photoId, url, expiresAt]
      properties:
        photoId: { $ref: '#/components/schemas/Uuid' }
        url: { type: string, format: uri }
        expiresAt: { type: string, format: date-time }
    OrderDownloads:
      type: object
      required: [orderId, downloads]
      properties:
        orderId: { $ref: '#/components/schemas/Uuid' }
        downloads:
          type: array
          items: { $ref: '#/components/schemas/OrderDownloadLink' }

    ConsentScope:
      type: string
      enum: [biometric, marketing, terms_of_service, privacy_policy]
    ConsentJurisdiction:
      type: string
      enum: [eu_gdpr, br_lgpd, us_bipa, us_ccpa, other]
    Consent:
      type: object
      required: [id, scope, grantedAt, jurisdiction, consentVersion, createdAt]
      properties:
        id: { $ref: '#/components/schemas/Uuid' }
        scope: { $ref: '#/components/schemas/ConsentScope' }
        subjectId: { $ref: '#/components/schemas/Uuid' }
        eventId: { $ref: '#/components/schemas/Uuid' }
        grantedAt: { type: string, format: date-time }
        revokedAt: { type: string, format: date-time, nullable: true }
        retentionUntil: { type: string, format: date-time, nullable: true }
        jurisdiction: { $ref: '#/components/schemas/ConsentJurisdiction' }
        consentVersion: { type: string }
        createdAt: { type: string, format: date-time }
    ConsentGrantRequest:
      type: object
      required: [eventId, jurisdiction, consentVersion]
      properties:
        eventId: { $ref: '#/components/schemas/Uuid' }
        jurisdiction: { $ref: '#/components/schemas/ConsentJurisdiction' }
        consentVersion: { type: string }
        locale: { type: string }
    BiometricExport:
      type: object
      required: [consents, faceVectorCount]
      properties:
        consents:
          type: array
          items: { $ref: '#/components/schemas/Consent' }
        faceVectorCount: { type: integer }

    AuditActorKind:
      type: string
      enum: [user, system, cron, admin, webhook]
    AuditLogEntry:
      type: object
      required: [id, actorKind, action, createdAt]
      properties:
        id:
          type: string
          description: Bigint id encoded as string.
        actorUserId: { $ref: '#/components/schemas/Uuid' }
        actorKind: { $ref: '#/components/schemas/AuditActorKind' }
        action: { type: string }
        targetKind: { type: string, nullable: true }
        targetId: { type: string, nullable: true }
        eventId: { $ref: '#/components/schemas/Uuid' }
        ipHash: { type: string, nullable: true }
        userAgent: { type: string, nullable: true }
        payloadJsonb:
          type: object
          additionalProperties: true
        createdAt: { type: string, format: date-time }
