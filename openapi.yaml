openapi: 3.1.0
info:
  title: photo-portfolio-store
  version: 0.1.0
  description: Photographer portfolio + print storefront API.
servers:
  - url: http://localhost:4000
    description: local
tags:
  - name: meta
    description: Service metadata and health endpoints.
paths:
  /health:
    get:
      operationId: getHealth
      tags:
        - meta
      summary: Liveness probe
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /:
    get:
      operationId: getRoot
      tags:
        - meta
      summary: Service root
      responses:
        '200':
          description: Service identity and availability.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RootResponse'
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
    RootResponse:
      type: object
      required:
        - name
        - ok
      properties:
        name:
          type: string
        ok:
          type: boolean
