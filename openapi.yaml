# This file is the source of truth for the photo-portfolio-store HTTP API.
# TypeScript types regenerate from this spec via `pnpm codegen`.
# Do not edit generated type files by hand.
#
# Conventions:
# - Every operation has operationId, summary, and at least one tag.
# - Bearer JWT auth is required for everything except /health, /, /v1/auth/*,
#   and /v1/events/{id}/search/face (which uses an explicit consent_id).
# - Operations marked `x-status: stub` are spec-only — the implementation
#   lands in a subsequent issue. The drift check uses this to distinguish
#   spec-only routes from implementation-backed routes.
# - Error responses uniformly reference #/components/schemas/ErrorResponse.

openapi: 3.1.0
info:
  title: photo-portfolio-store
  version: 0.1.0
  description: |
    Photographer portfolio + print storefront API.

    Bounded contexts: auth, events, media, search, catalog, commerce,
    compliance, admin. Each operation declares its context via tag.
servers:
  - url: http://localhost:4000
    description: local
tags:
  - name: meta
    description: Service metadata and health endpoints.
  - name: auth
    description: Registration, login, refresh, passwordless flows.
  - name: events
    description: Event lifecycle, members, FTP credentials.
  - name: media
    description: Resumable photo uploads, photo retrieval.
  - name: search
    description: Bib, name, and face-based photo search.
  - name: catalog
    description: Per-event product catalog.
  - name: commerce
    description: Carts, checkout, orders, digital downloads.
  - name: compliance
    description: Biometric consent grants and revocations.
  - name: admin
    description: Admin-only audit log access.
security: []
paths:
  /health:
    get:
      operationId: getHealth
      tags: [meta]
      summary: Liveness probe
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /:
    get:
      operationId: getRoot
      tags: [meta]
      summary: Service root
      responses:
        '200':
          description: Service identity and availability.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RootResponse'

  /v1/auth/register:
    post:
      operationId: authRegister
      tags: [auth]
      summary: Register a new user
      x-status: stub
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created and authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/ServerError' }
  /v1/auth/login:
    post:
      operationId: authLogin
      tags: [auth]
      summary: Email/password login
      x-status: stub
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Tokens issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/ServerError' }
  /v1/auth/refresh:
    post:
      operationId: authRefresh
      tags: [auth]
      summary: Exchange refresh token for a new access token
      x-status: stub
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New tokens issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }
  /v1/auth/logout:
    post:
      operationId: authLogout
      tags: [auth]
      summary: Revoke the current refresh session
      x-status: stub
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '204':
          description: Session revoked.
        '400': { $ref: '#/components/responses/BadRequest' }
        '500': { $ref: '#/components/responses/ServerError' }
  /v1/auth/passwordless/request:
    post:
      operationId: authPasswordlessRequest
      tags: [auth]
      summary: Request a passwordless magic-link/code by email
      x-status: stub
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordlessRequest'
      responses:
        '202':
          description: Request accepted; check email.
        '400': { $ref: '#/components/responses/BadRequest' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/ServerError' }
  /v1/auth/passwordless/verify:
    post:
      operationId: authPasswordlessVerify
      tags: [auth]
      summary: Verify a passwordless code and issue tokens
      x-status: stub
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordlessVerify'
      responses:
        '200':
          description: Tokens issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }

  /v1/events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List events visible to the caller
      x-status: stub
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/EventStatus' }
      responses:
        '200':
          description: Paginated events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEvents'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }
    post:
      operationId: createEvent
      tags: [events]
      summary: Create a new event
      x-status: stub
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventCreate'
      responses:
        '201':
          description: Event created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/ServerError' }
  /v1/events/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    get:
      operationId: getEvent
      tags: [events]
      summary: Retrieve a single event
      x-status: stub
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Event resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }
    patch:
      operationId: updateEvent
      tags: [events]
      summary: Partially update an event
      x-status: stub
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventPatch'
      responses:
        '200':
          description: Updated event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/ServerError' }
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Soft-delete (archive) an event
      x-status: stub
      security: [{ bearerAuth: [] }]
      responses:
        '204':
          description: Event archived.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }
  /v1/events/{id}/publish:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    post:
      operationId: publishEvent
      tags: [events]
      summary: Transition an event from draft to published
      x-status: stub
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Published event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/ServerError' }
  /v1/events/{id}/members:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    post:
      operationId: addEventMember
      tags: [events]
      summary: Add a member to an event
      x-status: stub
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventMemberCreate'
      responses:
        '201':
          description: Member added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventMember'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/ServerError' }
  /v1/events/{id}/members/{userId}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
      - in: path
        name: userId
        required: true
        schema: { $ref: '#/components/schemas/Uuid' }
    patch:
      operationId: updateEventMember
      tags: [events]
      summary: Update an event member's role or split
      x-status: stub
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventMemberPatch'
      responses:
        '200':
          description: Updated member.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventMember'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/ServerError' }
    delete:
      operationId: removeEventMember
      tags: [events]
      summary: Remove an event member
      x-status: stub
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Member removed. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }
  /v1/events/{id}/ftp-credentials:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    post:
      operationId: rotateEventFtpCredentials
      tags: [events]
      summary: Issue (rotate) FTP credentials for the event
      x-status: stub
      security: [{ bearerAuth: [] }]
      responses:
        '201':
          description: Newly issued credentials. The password is returned ONCE.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FtpCredentialIssued'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

  /v1/events/{eventId}/uploads/init:
    parameters:
      - in: path
        name: eventId
        required: true
        schema: { $ref: '#/components/schemas/Uuid' }
    post:
      operationId: initUpload
      tags: [media]
      summary: Initialize a resumable multipart upload
      x-status: stub
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadInitRequest'
      responses:
        '201':
          description: Upload session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadSession'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/ServerError' }
  /v1/uploads/{sessionId}/chunk/{partNumber}:
    parameters:
      - in: path
        name: sessionId
        required: true
        schema: { $ref: '#/components/schemas/Uuid' }
      - in: path
        name: partNumber
        required: true
        schema: { type: integer, minimum: 1, maximum: 10000 }
    post:
      operationId: uploadChunk
      tags: [media]
      summary: Upload a single multipart chunk
      x-status: stub
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
      responses:
        '200':
          description: Chunk accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadChunkAck'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/ServerError' }
  /v1/uploads/{sessionId}/complete:
    parameters:
      - in: path
        name: sessionId
        required: true
        schema: { $ref: '#/components/schemas/Uuid' }
    post:
      operationId: completeUpload
      tags: [media]
      summary: Finalize a multipart upload
      x-status: stub
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Upload completed; photo row created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Photo'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/ServerError' }
  /v1/uploads/{sessionId}:
    parameters:
      - in: path
        name: sessionId
        required: true
        schema: { $ref: '#/components/schemas/Uuid' }
    delete:
      operationId: abortUpload
      tags: [media]
      summary: Abort an in-flight upload
      x-status: stub
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Upload aborted. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }
  /v1/events/{id}/photos:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    get:
      operationId: listEventPhotos
      tags: [media]
      summary: List photos in an event
      x-status: stub
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/PhotoStatus' }
      responses:
        '200':
          description: Paginated photos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPhotos'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }
  /v1/photos/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    get:
      operationId: getPhoto
      tags: [media]
      summary: Retrieve a single photo with its derivatives
      x-status: stub
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Photo resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Photo'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

  /v1/events/{id}/search/bib:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    post:
      operationId: searchByBib
      tags: [search]
      summary: Search photos by bib number
      x-status: stub
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BibSearchRequest'
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResults'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/ServerError' }
  /v1/events/{id}/search/name:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    post:
      operationId: searchByName
      tags: [search]
      summary: Search photos by participant name
      x-status: stub
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NameSearchRequest'
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResults'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/ServerError' }
  /v1/events/{id}/search/face:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    post:
      operationId: searchByFace
      tags: [search]
      summary: Search photos by selfie (face embedding)
      description: |
        Uses an existing biometric consent_id instead of bearer auth.
        The selfie image is never persisted.
      x-status: stub
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FaceSearchRequest'
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResults'
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/ServerError' }

  /v1/events/{id}/products:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    get:
      operationId: listEventProducts
      tags: [catalog]
      summary: List products for an event
      x-status: stub
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated products.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProducts'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }
    post:
      operationId: createEventProduct
      tags: [catalog]
      summary: Create a product for an event
      x-status: stub
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreate'
      responses:
        '201':
          description: Product created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/ServerError' }

  /v1/pricing/tiers:
    get:
      operationId: listPricingTiers
      tags: [commerce]
      summary: List license tiers with their price multipliers
      description: >
        Public storefront endpoint. Returns the license tiers and the effective
        price multiplier for each, resolved from pricing_rules (kind=tier_uplift)
        with precedence event-scoped > global > built-in default. Pass eventId to
        get event-specific multipliers.
      parameters:
        - name: eventId
          in: query
          required: false
          schema: { $ref: '#/components/schemas/Uuid' }
      responses:
        '200':
          description: Tier list with multipliers.
          content:
            application/json:
              schema:
                type: object
                required: [tiers]
                properties:
                  tiers:
                    type: array
                    items: { $ref: '#/components/schemas/PricingTier' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '500': { $ref: '#/components/responses/ServerError' }

  /v1/pricing/evaluate:
    post:
      operationId: evaluatePricing
      tags: [commerce]
      summary: Evaluate discount rules for a set of line items
      description: >
        Public price quote. Applies the highest-precedence matching pricing_rules
        (qty discounts, time windows, pre-event) and returns an itemized
        breakdown. Pure/deterministic; no DB writes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PricingEvaluateRequest'
      responses:
        '200':
          description: Itemized price evaluation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PricingEvaluateResult'
        '400': { $ref: '#/components/responses/BadRequest' }
        '500': { $ref: '#/components/responses/ServerError' }

  /v1/events/{eventId}/bundles:
    parameters:
      - name: eventId
