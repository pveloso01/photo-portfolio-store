# ci.yml — Continuous Integration pipeline for photo-portfolio-store
#
# Jobs (top-level, names referenced by docs/branch-protection.md):
#   - lint          Biome (TS workspace) + ruff (apps/inference)
#   - typecheck     pnpm -r typecheck (TS) + uv run pyright (Python)
#   - test          pnpm -r test (vitest) + uv run pytest (Python)
#   - build         pnpm -r build
#   - security-scan gitleaks secret scan + pnpm audit (high+)
#
# See docs/branch-protection.md for the required-status-checks runbook.

name: ci

on:
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm lint

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync Python env
        run: uv sync --all-extras --directory apps/inference

      - name: Ruff check
        run: uv run --directory apps/inference ruff check .

      - name: Success
        run: echo "lint: OK"

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript typecheck
        run: pnpm -r typecheck

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync Python env (with dev extras for pyright)
        run: uv sync --all-extras --directory apps/inference

      - name: Pyright typecheck
        run: uv run --directory apps/inference pyright

      - name: Success
        run: echo "typecheck: OK"

  test:
    name: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript tests (vitest)
        run: pnpm -r test

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync Python env
        run: uv sync --all-extras --directory apps/inference

      - name: Pytest
        run: uv run --directory apps/inference pytest

      - name: Success
        run: echo "test: OK (node ${{ matrix.node-version }})"

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Success
        run: echo "build: OK"

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (fail on high+)
        run: pnpm audit --audit-level=high

      - name: Success
        run: echo "security-scan: OK"
