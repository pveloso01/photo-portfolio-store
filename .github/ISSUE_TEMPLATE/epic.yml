name: Epic
description: A phase-level container that groups related sub-issues.
title: "[EPIC] "
labels: ["type:epic"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: One paragraph describing the outcome this epic delivers.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: "In scope and out of scope. Be explicit about exclusions."
      value: |
        **In scope:**
        -

        **Out of scope:**
        -
    validations:
      required: true
  - type: textarea
    id: subissues
    attributes:
      label: Sub-issues
      description: Checklist linking each child sub-issue (use task list syntax for auto-rollup).
      value: |
        - [ ] #
    validations:
      required: true
  - type: textarea
    id: quality_gates
    attributes:
      label: Quality gates
      description: Phase-level acceptance bar beyond per-issue gates.
      value: |
        - All sub-issues closed
        - Integration tests for end-to-end flow green
        - Performance budget met
        - Compliance review signed off
    validations:
      required: true
  - type: textarea
    id: dod
    attributes:
      label: Definition of done
      description: Demonstrable, observable conditions that prove the epic is complete.
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Other epics, services, or external systems this epic depends on.
  - type: textarea
    id: risks
    attributes:
      label: Risks
      description: Known risks and mitigations.
